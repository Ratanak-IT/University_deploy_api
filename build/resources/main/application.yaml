minio:
  endpoint: https://s3.careerpatch.site
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket:
    assets: university-assets
    lessons: university-lessons

spring:
  security:
    oauth2:

      client:
        registration:
          keycloak:
            client-id: university-api
            client-secret: ${KEYCLOAK_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
            authorization-grant-type: authorization_code
            redirect-uri: http://auth.careerpatch.site/login/oauth2/code/keycloak

        provider:
          keycloak:
            issuer-uri: https://auth.careerpatch.site/realms/university
            user-name-attribute: preferred_username

      resourceserver:
        jwt:
          issuer-uri: https://auth.careerpatch.site/realms/university

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

  datasource:
    url: jdbc:postgresql://15.235.209.49:1688/university_db
    username: ratanak
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.springframework.security: TRACE

keycloak:
  server-url: https://auth.careerpatch.site

  realm: master
  target-realm: university

  client-id: university-api
  client-secret: ${KEYCLOAK_CLIENT_SECRET}
  scope: openid profile email

  admin-client-id: admin-cli
  admin-username: ${KEYCLOAK_ADMIN_USERNAME}
  admin-password: ${KEYCLOAK_ADMIN_PASSWORD}

server:
  port: 8081