minio:
  endpoint: https://s3.careerpatch.site
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket:
    assets: university-assets
    lessons: university-lessons

spring:
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: ratanak-demo
            client-secret: ${KEYCLOAK_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:8080/login/oauth2/code/keycloak

        provider:
          keycloak:
            issuer-uri: http://localhost:8080/realms/university
            user-name-attribute: preferred_username

      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/university

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

  datasource:
    url: jdbc:postgresql://localhost:1681/university
    username: postgres
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true


keycloak:
  server-url: http://localhost:8080
  realm: university
  client-id: ratanak-demo
  client-secret: ${KEYCLOAK_CLIENT_SECRET}
server:
  port: 8081